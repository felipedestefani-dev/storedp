<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Organizador de tarefas — lições, trabalhos e prazos num só lugar." />
    <title>Organizador de tarefas</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <svg xmlns="http://www.w3.org/2000/svg" class="svgSprite" aria-hidden="true">
      <symbol id="logo-organizador" viewBox="0 0 64 64">
        <rect width="64" height="64" rx="16" fill="currentColor" />
        <rect x="14" y="17" width="26" height="4" rx="2" fill="#ffffff" />
        <rect x="14" y="28" width="18" height="4" rx="2" fill="#ffffff" opacity="0.92" />
        <rect x="14" y="39" width="22" height="4" rx="2" fill="#ffffff" opacity="0.92" />
        <path
          fill="none"
          stroke="#ffffff"
          stroke-width="3.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M38 42l5 5 12-14"
        />
      </symbol>
    </svg>

    <div id="app">
      <header class="appHeader">
        <div class="appHeaderInner">
          <div class="appHeaderBrand">
            <span class="brandMark brandMark--toolbar" aria-hidden="true">
              <svg class="brandMarkSvg" width="32" height="32" focusable="false">
                <use href="#logo-organizador" />
              </svg>
            </span>
            <span class="appLogo">Organizador de tarefas</span>
          </div>
          <p class="appHint">Salvo neste navegador</p>
        </div>
      </header>
      <div class="appMain">
        <div class="board">
          <div class="boardIntro">
            <h1 class="boardTitle">Seu painel</h1>
            <p class="boardSub" id="board-stats"></p>
          </div>
          <div id="board-error" class="banner bannerError" role="alert" hidden></div>

          <section class="card formCard" aria-labelledby="add-heading">
            <h2 id="add-heading" class="cardTitle">Adicionar</h2>
            <form id="form-add" class="formGrid">
              <div class="field">
                <label for="titulo">Título</label>
                <input id="titulo" name="titulo" placeholder="Ex.: Redação de história" required autocomplete="off" />
              </div>
              <div class="field">
                <label for="tipo">Tipo</label>
                <select id="tipo" name="tipo">
                  <option value="lição">Lição</option>
                  <option value="trabalho" selected>Trabalho</option>
                </select>
              </div>
              <div class="field">
                <label for="entrega">Entrega (opcional)</label>
                <input id="entrega" name="entrega" type="date" />
              </div>
              <div class="field fieldSpan">
                <label for="obs">Observações</label>
                <textarea id="obs" name="obs" rows="2" placeholder="Detalhes, link da sala…"></textarea>
              </div>
              <div class="field fieldSpan formActions">
                <button type="submit" class="btn btnPrimary">Adicionar à lista</button>
              </div>
            </form>
          </section>

          <section class="listSection" aria-labelledby="list-heading">
            <div class="listToolbar">
              <h2 id="list-heading" class="cardTitle listHeading">Lista</h2>
              <div class="filterChips" role="tablist" aria-label="Filtrar por tipo">
                <button type="button" class="filterChip filterChipActive" data-filter="todos">Todos</button>
                <button type="button" class="filterChip" data-filter="lição">Lições</button>
                <button type="button" class="filterChip" data-filter="trabalho">Trabalhos</button>
              </div>
            </div>
            <div id="list-empty" class="emptyState" hidden>
              <p>Nada aqui ainda.</p>
              <p class="muted small">Use o formulário acima para adicionar.</p>
            </div>
            <ul id="item-list" class="itemList"></ul>
          </section>
        </div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
